apiVersion: 1

providers:
  - name: 'Default'
    orgId: 1
    folder: ''
    type: file
    # Разрешаем Grafana обновлять графики, если JSON-файл изменился
    disableDeletion: false
    updateIntervalSeconds: 10
    options:
      # Внутренний путь в контейнере, куда смонтирована папка config/grafana/dashboards
      path: /etc/grafana/dashboards